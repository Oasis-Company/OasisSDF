<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OasisSDF - Basic Sphere Example</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #121212;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <h3>OasisSDF - Basic Sphere</h3>
    <p>Press SPACE to toggle animation</p>
    <p>Use mouse to move camera</p>
  </div>

  <script type="module">
    import { Engine, SDFObjectData } from '../../dist/index.js';

    // Get canvas element
    const canvas = document.getElementById('canvas');
    if (!canvas) {
      throw new Error('Canvas element not found');
    }

    // Set canvas size
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Create engine instance
    const engine = new Engine({
      canvas,
      maxObjects: 1000,
      debug: true,
      backgroundColor: [0.1, 0.1, 0.15]
    });

    // Initialize engine
    async function init() {
      try {
        await engine.initialize();
        console.log('Engine initialized successfully');

        // Add a sphere object
        const sphere: SDFObjectData = {
          type: 1, // Sphere
          position: [0, 0, 0],
          rotation: [0, 0, 0],
          scale: [1, 1, 1]
        };

        engine.addObject(sphere);

        // Add some more objects
        for (let i = 0; i < 5; i++) {
          const offset = (i - 2) * 2;
          const object: SDFObjectData = {
            type: i % 6 + 1, // Different primitive types
            position: [offset, 0, 0],
            rotation: [0, 0, 0],
            scale: [0.5, 0.5, 0.5]
          };
          engine.addObject(object);
        }

        // Start animation
        engine.start();

        // Add event listeners
        addEventListeners();

      } catch (error) {
        console.error('Error initializing engine:', error);
      }
    }

    // Add event listeners
    function addEventListeners() {
      let isAnimating = true;
      
      // Toggle animation
      window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
          if (isAnimating) {
            engine.stop();
            isAnimating = false;
          } else {
            engine.start();
            isAnimating = true;
          }
        }
      });

      // Resize handler
      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        engine.resize(window.innerWidth, window.innerHeight);
      });

      // Mouse handler for camera control
      let isDragging = false;
      let lastX = 0;
      let lastY = 0;

      canvas.addEventListener('mousedown', (e) => {
        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
      });

      canvas.addEventListener('mousemove', (e) => {
        if (isDragging) {
          const deltaX = e.clientX - lastX;
          const deltaY = e.clientY - lastY;
          lastX = e.clientX;
          lastY = e.clientY;

          // Update camera position
          const camera = engine.getCamera();
          const sensitivity = 0.01;
          
          // Simple orbit camera
          const radius = Math.sqrt(
            camera.position[0] * camera.position[0] +
            camera.position[2] * camera.position[2]
          );
          
          const theta = Math.atan2(camera.position[0], camera.position[2]) + deltaX * sensitivity;
          const phi = Math.atan2(
            Math.sqrt(camera.position[0] * camera.position[0] + camera.position[2] * camera.position[2]),
            camera.position[1]
          ) - deltaY * sensitivity;

          const newX = radius * Math.sin(theta) * Math.sin(phi);
          const newY = radius * Math.cos(phi);
          const newZ = radius * Math.cos(theta) * Math.sin(phi);

          engine.updateCamera({
            position: [newX, newY, newZ]
          });
        }
      });

      canvas.addEventListener('mouseup', () => {
        isDragging = false;
      });

      canvas.addEventListener('mouseleave', () => {
        isDragging = false;
      });
    }

    // Start initialization
    init();
  </script>
</body>
</html>
